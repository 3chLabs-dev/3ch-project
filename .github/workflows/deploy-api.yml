name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "3ch-api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Discord - 배포 시작 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "🔄 시작"
          title: "[API] 배포 시작"
          description: |
            브랜치: `${{ github.ref_name }}`
            커밋: ${{ github.event.head_commit.message }}
            작성자: ${{ github.actor }}
          color: 0x5865f2
          nofail: true
          nodetail: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            set -e

            cd /opt/3ch-api/3ch-project

            echo "==> git pull"
            git pull origin main

            echo "==> npm ci"
            cd 3ch-api
            npm ci --omit=dev

            echo "==> prisma migrate"
            npx prisma migrate deploy

            echo "==> pm2 restart"
            pm2 restart 3ch-api || pm2 start src/server.js --name 3ch-api

            echo "==> done"

      - name: Discord - 배포 결과 알림
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "[API] 배포 완료"
          description: |
            브랜치: `${{ github.ref_name }}`
            커밋: ${{ github.event.head_commit.message }}
            작성자: ${{ github.actor }}
          nofail: true
