name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "3ch-web/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 3ch-web/package-lock.json

      - name: Install dependencies
        working-directory: 3ch-web
        run: npm ci

      - name: Build
        working-directory: 3ch-web
        run: npm run build

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          source: "3ch-web/dist/"
          target: /var/www/3ch
          strip_components: 2

      - name: Set permissions & reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            sudo find /var/www/3ch -type d -exec chmod 755 {} \;
            sudo find /var/www/3ch -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx
