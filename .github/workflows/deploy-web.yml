name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "3ch-web/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Discord - 배포 시작 알림
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: "🔄 시작"
          title: "[Web] 배포 시작"
          description: |
            브랜치: `${{ github.ref_name }}`
            커밋: ${{ github.event.head_commit.message }}
            작성자: ${{ github.actor }}
          color: 0x5865f2
          nofail: true
          nodetail: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 3ch-web/package-lock.json

      - name: Install dependencies
        working-directory: 3ch-web
        run: npm ci

      - name: Build
        working-directory: 3ch-web
        run: npm run build

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          source: "3ch-web/dist/"
          target: /var/www/3ch
          strip_components: 2

      - name: Set permissions & reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            sudo find /var/www/3ch -type d -exec chmod 755 {} \;
            sudo find /var/www/3ch -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx

      - name: Discord - 배포 결과 알림
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "[Web] 배포 완료"
          description: |
            브랜치: `${{ github.ref_name }}`
            커밋: ${{ github.event.head_commit.message }}
            작성자: ${{ github.actor }}
          nofail: true
