name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "3ch-api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Discord - 배포 시작 알림
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          jq -n \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg commit "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              username: "3CH Deploy",
              embeds: [{
                title: "🔄  API 배포 시작",
                url: $url,
                color: 5793266,
                fields: [
                  {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                  {name: "작성자", value: $actor, inline: true},
                  {name: "커밋 메시지", value: $commit, inline: false}
                ],
                footer: {text: "GitHub Actions · 3CH"}
              }]
            }' | curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d @-

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            set -e

            cd /opt/3ch-api/3ch-project

            echo "==> git pull"
            git pull origin main

            echo "==> npm ci"
            cd 3ch-api
            npm ci --omit=dev

            echo "==> prisma migrate"
            npx prisma migrate deploy

            echo "==> pm2 restart"
            pm2 restart 3ch-api || pm2 start src/server.js --name 3ch-api

            echo "==> done"

      - name: Discord - 배포 결과 알림
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI="✅"; COLOR=5763719; LABEL="성공"
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            EMOJI="⚠️"; COLOR=16705372; LABEL="취소됨"
          else
            EMOJI="❌"; COLOR=15548997; LABEL="실패"
          fi
          jq -n \
            --arg title "$EMOJI  API 배포 $LABEL" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg commit "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson color "$COLOR" \
            '{
              username: "3CH Deploy",
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                  {name: "작성자", value: $actor, inline: true},
                  {name: "커밋 메시지", value: $commit, inline: false}
                ],
                footer: {text: "GitHub Actions · 3CH"},
                timestamp: "${{ github.event.head_commit.timestamp }}"
              }]
            }' | curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d @-
