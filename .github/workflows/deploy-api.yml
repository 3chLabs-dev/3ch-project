name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "3ch-api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            set -e

            cd /opt/3ch-api/3ch-project

            echo "==> git pull"
            git pull origin main

            echo "==> npm ci"
            cd 3ch-api
            npm ci --omit=dev

            echo "==> prisma migrate"
            npx prisma migrate deploy

            echo "==> pm2 restart"
            pm2 restart 3ch-api || pm2 start src/server.js --name 3ch-api

            echo "==> done"
